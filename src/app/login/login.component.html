<section class="login-shell">
  <div class="login-card">
    <header class="login-header">
      <h1>Sign in to Playville CRM</h1>
      <p>Access customer onboarding, children creation, and account management.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field-group">
        <span>Username</span>
        <input type="text" formControlName="username" placeholder="your username" autocomplete="username" />
      </label>
      <div class="field-error" *ngIf="form.controls['username'].invalid && form.controls['username'].touched">
        <span *ngIf="form.controls['username'].errors?.['required']">Username is required.</span>
      </div>

      <label class="field-group">
        <span>Password</span>
        <input type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
      </label>
      <div class="field-error" *ngIf="form.controls['password'].invalid && form.controls['password'].touched">
        <span *ngIf="form.controls['password'].errors?.['required']">Password is required.</span>
        <span *ngIf="form.controls['password'].errors?.['minlength']">Password must be at least 6 characters.</span>
      </div>

      <label class="checkbox">
        <input type="checkbox" formControlName="rememberMe" />
        <span>Remember me</span>
      </label>

      <button type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>

      <div class="form-message error" *ngIf="error">{{ error }}</div>
    </form>

    <footer class="login-footer">
      <p>Need help? Contact your Playville CRM administrator.</p>
    </footer>
  </div>
</section>
